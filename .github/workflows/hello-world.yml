name: Hello World

on:
  pull_request:
    types: [opened]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: dev
        type: choice
        options:
          - dev
          - pat
          - prod

jobs:
  hello:
    runs-on: ubuntu-latest
    steps:
      - name: Print Hello World
        run: echo "Hello World — environment: ${{ github.event.inputs.environment || 'dev' }}"
